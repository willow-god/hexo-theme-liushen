      # 起始年份。主题会显示 since 到当前年份的版权时间。
      since: 2021
    # 页脚底部左侧链接，例如备案信息。默认留空，避免开源主题带示例备案。
    left:
      # - text: 备案号
      #   desrc: 工信部备案
      #   link: https://beian.example.com/
      # - text: 安备号
      #   desrc: 公安备案
      #   link: https://beian.example.com/police
    # 页脚底部右侧链接，例如框架、主题或 CDN 说明。
    right:
      - text: CDN加速
        # 鼠标悬停提示文案。
        desrc: 本站通过 CDN 提供加速服务
        # 留空时只显示文字，不输出链接。
        link:
      - text: 静态框架
        desrc: 本站使用 Hexo 架构搭建而成
        link: https://hexo.io/zh-cn/
      - text: 主题名称
        desrc: 本站基于 Butterfly 主题魔改而成
        link:
    # 站点运行时间配置。
    runtime:
      # 是否显示站点运行时间。
      enable: true
      # 建站时间，格式建议为 YYYY/MM/DD HH:mm:ss。
      time: 2021/12/12 01:27:36

# --------------------------------------
# 侧栏设置
# --------------------------------------

aside:
  # 是否显示侧栏。
  enable: true
  # 是否默认隐藏侧栏。
  hide: false
  # 显示隐藏侧栏的按钮（位于右下角）
  button: true
  # 移动端是否显示侧栏。
  mobile: false
  # 位置：left / right
  position: right
  # 控制侧栏在哪些归档类页面显示。
  display:
    # 归档页是否显示侧栏。
    archive: true
    # 标签页是否显示侧栏。
    tag: true
    # 分类页是否显示侧栏。
    category: true
  # 作者信息卡片。
  card_author:
    # 是否显示作者信息卡片。
    enable: true
    # 作者卡片的问候语，支持 HTML。
    hello: Welcome
    # 作者卡片描述。留空时使用 Hexo 根配置 description。
    description:
    # 作者卡片背景图。留空时使用主题内置渐变背景。
    card_bg_img:
    # 作者卡片右侧/角落心情图标。留空时不显示。
    mood_icon:
    # 作者卡片按钮。
    button:
      # 是否显示作者卡片按钮。
      enable: false
      # 按钮图标 class，通常使用 Font Awesome。
      icon: fab fa-github
      # 按钮文字。
      text: Follow Me 🛫
      # 按钮链接。
      link:
  # 欢迎卡片，可显示自定义欢迎语和访客位置信息。
  card_welcome:
    # 是否显示欢迎卡片。
    enable: false
    # 欢迎卡片标题。
    title: Welcome
    # 欢迎卡片标题图标 class，通常使用 Font Awesome。
    icon: fa fa-user
    # 欢迎卡片正文，支持 HTML。
    content:
    # 地址 API 请求失败或未返回有效数据时显示的文案。
    error_text: Location service unavailable
    # 欢迎卡片内的地理位置展示设置。
    location:
      # 是否在欢迎卡片中显示访客地理位置/IP 信息。
      # 这里仅控制卡片展示；接口地址和密钥统一配置在顶层 location_api。
      enable: false
      # 站点基准经度。填写后会计算访客到该坐标的距离；留空则不显示距离。
      base_lng:
      # 站点基准纬度。填写后会计算访客到该坐标的距离；留空则不显示距离。
      base_lat:
      # 距离描述中的目标名称，例如 site owner / 博主 / 工作室。
      distance_label: site owner
  # 公告卡片。
  card_announcement:
    # 是否显示公告卡片。
    enable: true
    # 公告内容，支持 HTML；留空时卡片仍按模板显示空内容，建议不用时关闭。
    content: 
  # 最近文章卡片。
  card_recent_post:
    # 是否显示最近文章卡片。
    enable: true
    # 如果设置为 0，将显示所有文章
    limit: 4
    # 排序：date / updated
    sort: updated
    # 卡片排序权重；留空时使用主题默认顺序，数字越小越靠前。
    sort_order:
  # 最新评论卡片。
  card_newest_comments:
    # 是否显示最新评论卡片。需要启用并正确配置对应评论系统。
    enable: false
    # 卡片排序权重；留空时使用主题默认顺序。
    sort_order:
    # 显示评论数量。
    limit: 5
    # 单位：分钟，保存数据到本地存储
    storage: 10
    # 是否显示评论者头像。
    avatar: true
  # 分类卡片。
  card_categories:
    # 是否显示分类卡片。
    enable: false
    # 如果设置为 0，将显示所有分类
    limit: 8
    # 选择：none / true / false
    expand: none
    # 卡片排序权重；留空时使用主题默认顺序。
    sort_order:
  # 标签卡片。
  card_tags:
    # 是否显示标签卡片。
    enable: true
    # 如果设置为 0，将显示所有标签
    limit: 30
    # 是否启用彩色标签样式。
    color: false
    # 标签排序：random/name/length
    orderby: random
    # 排序顺序。1，asc 为升序；-1，desc 为降序
    order: 1
    # 卡片排序权重；留空时使用主题默认顺序。
    sort_order:
  # 归档卡片。
  card_archives:
    # 是否显示归档卡片。
    enable: true
    # 类型：monthly / yearly
    type: monthly
    # 例如：YYYY年MM月
    format: YYYY · MMMM
    # 排序顺序。1，asc 为升序；-1，desc 为降序
    order: -1
    # 如果设置为 0，将显示所有归档
    limit: 5
    # 卡片排序权重；留空时使用主题默认顺序。
    sort_order:
  # 文章系列卡片。
  card_post_series:
    # 是否显示文章系列卡片。仅对设置了 series 的文章生效。
    enable: true
    # 显示系列名称为标题
    series_title: false
    # 排序方式：title 或 date
    orderBy: 'date'
    # 排序顺序。1，asc 为升序；-1，desc 为降序
    order: -1
  # 网站信息卡片。
  card_webinfo:
    # 是否显示站点信息卡片。
    enable: true
    # 是否显示文章总数。
    post_count: true
    # 是否显示最后更新时间。
    last_push_date: true
    # 卡片排序权重；留空时使用主题默认顺序。
    sort_order:
    # 发布时间与现在的时间差
    # 格式：Month/Day/Year Time 或 Year/Month/Day Time
    # 如果不启用此功能，则留空
    runtime_date: 2021/12/12 01:27:36

# 全站共享的 IP/地址查询 API。
# 当前欢迎卡片会使用它；后续其他需要地址定位的功能也应复用这里，避免重复配置 key。
location_api:
  # 接口地址。默认内置可用接口；如更换服务，接口响应需能提供 ip/country/prov/city/lng/lat 等字段。
  api: https://v1.nsuuu.com/api/ipip
  # 接口密钥。需要 key 的服务在这里填写；留空时请求不会附加 key 参数。
  api_key:
  # 浏览器本地缓存时长，单位：小时。用于减少重复请求地址接口。
  cache_hours: 24

# 侧栏诗句卡片。
# 默认关闭，避免主题安装后自动请求第三方接口；需要时开启并可替换 api。
poem_card:
  # 是否显示诗句卡片。
  enable: false
  # 诗句接口地址。默认期望返回 JSON 且诗句文本位于 data 字段。
  api: https://v1.nsuuu.com/api/yiyan?type=poetry
  # 浏览器本地缓存时长，单位：分钟。
  cache_minutes: 30
  # 接口失败、接口为空或解析失败时显示的兜底内容。
  fallback:
    # 诗句获取失败时显示的句子。
    sentence: 获取失败
    # 诗句获取失败时显示的标题。
    title: 《未知》
    # 诗句获取失败时显示的作者。
    author: 未知

# --------------------------------------
# 右下角按钮
# --------------------------------------

# 右下角按钮与底部的距离（默认单位：px）
rightside_bottom:

# 繁简转换
translate:
  # 是否启用繁简转换按钮。
  enable: true
  # 按钮的文本
  default: 繁
  # 网站的语言 (1 - 繁体中文 / 2 - 简体中文）
  defaultEncoding: 2
  # 延迟时间
  translateDelay: 0
  # 当语言为简体中文时按钮的文本
  msgToTraditionalChinese: '繁'
  # 当语言为繁体中文时按钮的文本
  msgToSimplifiedChinese: '簡'

# 阅读模式
readmode: true

# 黑暗模式
darkmode:
  # 是否启用深色模式。
  enable: true
  # 切换按钮用于切换黑暗/明亮模式
  button: true
  # 自动切换黑暗/明亮模式
  # autoChangeMode: 1  跟随系统设置，如果系统不支持黑暗模式，它将在晚上6点到早上6点之间切换黑暗模式
  # autoChangeMode: 2  在晚上6点到早上6点之间切换黑暗模式
  # autoChangeMode: false
  autoChangeMode: 2
  # 设置明亮模式时间。值在0到24之间。如果未设置，默认值为6和18
  # 明亮模式开始小时。
  start:
  # 明亮模式结束小时。
  end:

# 在返回顶部按钮中显示滚动百分比
rightside_scroll_percent: false

# 请勿修改以下设置，除非你知道它们的作用
# 选择: readmode,translate,darkmode,hideAside,toc,chat,comment
# 不要重复相同的值
rightside_item_order:
  # 是否自定义右下角按钮排序。
  enable: false
  # 默认: readmode,translate,darkmode,hideAside
  hide:
  # 默认: toc,chat,comment
  show:

# --------------------------------------
# 全局设置
# --------------------------------------

anchor:
  # 滚动时，URL会根据标题ID进行更新
  auto_update: false
  # 点击标题进行滚动并更新锚点
  click_to_scroll: true

# 图片描述文字
photofigcaption: true

# 复制行为设置。
copy:
  # 是否允许文章内容复制。
  enable: true
  # 复制内容后添加版权信息
  copyright:
    # 是否在复制内容后追加版权声明。
    enable: true
    # 超过多少字时追加版权声明。
    limit_count: 1000

# 字数统计。需要安装 hexo-wordcount 插件；未安装时建议保持关闭。
wordcount:
  # 是否启用字数统计。需要安装 hexo-wordcount。
  enable: false
  # 在文章元数据中显示文章的字数
  post_wordcount: true
  # 在文章元数据中显示阅读时间
  min2read: true
  # 在侧栏的网页信息中显示网站的总字数
  total_wordcount: true

# Busuanzi 网站 PV / UV 统计。会请求第三方统计脚本；开源默认关闭。
busuanzi:
  # 是否显示全站访客数 UV。
  site_uv: false
  # 是否显示全站访问量 PV。
  site_pv: false
  # 是否显示当前页面访问量 PV。
  page_pv: false

# --------------------------------------
# 数学公式
# --------------------------------------

# 关于 per_page
# 如果设置为 true，它将在每个页面加载 mathjax/katex 脚本
# 如果设置为 false，它将根据你的设置加载 mathjax/katex 脚本（在页面的 front-matter 中添加 'mathjax: true' 或 'katex: true'）
math:
  # 选择: mathjax, katex
  # 如果不需要数学公式，请留空
  use:
  # true: 全站加载数学公式脚本；false: 仅在 front-matter 标记的页面加载。
  per_page: true
  # 是否隐藏数学公式横向滚动条。
  hide_scrollbar: false

  # MathJax 配置。
  mathjax:
    # 启用上下文菜单
    enableMenu: true
    # 选择: all / ams / none，这控制是否对公式进行编号以及如何编号
    tags: none

  # KaTeX 配置。
  katex:
    # 启用复制 KaTeX 公式
    copy_tex: false

# --------------------------------------
# 搜索
# --------------------------------------

search:
  # 选择: algolia_search / local_search / docsearch
  # 如果不需要搜索，请留空
  use:
  # 搜索框占位文案。
  placeholder: 搜索全站文章

  # Algolia 搜索
  algolia_search:
    # 每页搜索结果数量
    hitsPerPage: 6

  # 本地搜索
  local_search:
    # 页面加载时预加载搜索数据
    preload: false
    # 每篇文章显示前n条结果，设置为-1显示所有结果
    top_n_per_article: 1
    # 将HTML字符串转义为可读字符串
    unescape: false
    # 本地搜索脚本 CDN。留空时跟随全局 CDN 配置。
    CDN:

  # Docsearch
  # https://docsearch.algolia.com/
  docsearch:
    # DocSearch 应用 ID。
    appId:
    # DocSearch 搜索 API Key。
    apiKey:
    # DocSearch 索引名称。
    indexName:
    # DocSearch 额外初始化配置，会合并到默认配置。
    option:

# --------------------------------------
# 分享系统
# --------------------------------------

share:
  # 选择: sharejs / addtoany
  # 如果不需要分享，请留空
  use: sharejs

  # Share.js
  # https://github.com/overtrue/share.js
  sharejs:
    # Share.js 分享站点列表，使用英文逗号分隔。
    sites: facebook,twitter,wechat,weibo,qq

  # AddToAny
  # https://www.addtoany.com/
  addtoany:
    # AddToAny 分享按钮列表，使用英文逗号分隔。
    item: facebook,twitter,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统
# --------------------------------------

comments:
  # 最多两个评论系统，第一个将作为默认显示
  # 如果不需要评论，请留空
  # 选择: Disqus/Disqusjs/Livere/Gitalk/Valine/Waline/Utterances/Facebook Comments/Twikoo/Giscus/Remark42/Artalk
  # 两个评论系统的格式 : Disqus,Waline
  use:
  # 在按钮旁边显示评论名称
  text: true
  # 延迟加载: 评论系统将在评论元素进入浏览器视口时加载
  # 如果设置为 true，评论数量将无效
  lazyload: false
  # 在文章顶部图片中显示评论数
  count: false
  # 在首页显示评论数
  card_post_count: false

# Disqus
# https://disqus.com/
disqus:
  # Disqus shortname。
  shortname:
  # 用于最新评论小部件
  apikey:

# 替代 Disqus - 使用 Disqus API 渲染评论
# https://github.com/SukkaW/DisqusJS
disqusjs:
  # Disqus shortname。
  shortname:
  # Disqus API Key。
  apikey:
  # DisqusJS 额外配置。
  option:

# Livere
# https://www.livere.com/
livere:
  # Livere 后台提供的 UID。
  uid:

# Gitalk
# https://github.com/gitalk/gitalk
gitalk:
  # GitHub OAuth App Client ID。
  client_id:
  # GitHub OAuth App Client Secret。公开仓库使用时请理解暴露风险。
  client_secret:
  # 用作评论 issue 的 GitHub 仓库名。
  repo:
  # GitHub 仓库所有者。
  owner:
  # 评论管理员 GitHub 用户名列表。
  admin:
  # Gitalk 额外配置。
  option:

# Valine
# https://valine.js.org
valine:
  # LeanCloud App ID。
  appId:
  # LeanCloud App Key。
  appKey:
  # 默认头像类型。
  avatar: monsterid
  # 此配置适用于国内自定义域名用户，海外版本将自动检测（无需手动填写）
  serverURLs:
  # 评论区背景图。
  bg:
  # 使用 Valine 访客计数作为页面浏览量
  visitor: false
  # Valine 额外配置。
  option:

# Waline - 一个带有后端支持的简单评论系统，分叉自 Valine
# https://waline.js.org/
waline:
  # Waline 服务端地址。
  serverURL: 
  # 评论区背景图。
  bg: 
  # 使用 Waline 页面浏览量计数作为页面浏览量
  pageview: false
  # Waline 额外配置。
  option:

# Utterances
# https://utteranc.es/
utterances:
  # GitHub 仓库，格式：owner/repo。
  repo:
  # Issue 映射: pathname/url/title/og:title
  issue_term: pathname
  # 主题: github-light/github-dark/github-dark-orange/icy-dark/dark-blue/photon-dark
  light_theme: github-light
  # 深色模式主题。
  dark_theme: photon-dark
  # 自定义 utterances 脚本地址。留空时使用默认地址。
  js:
  # Utterances 额外配置。
  option:

# Facebook 评论插件
# https://developers.facebook.com/docs/plugins/comments/
facebook_comments:
  # Facebook App ID。
  app_id:
  # 可选
  user_id:
  # 每页评论数。
  pageSize: 10
  # 选择: social / time / reverse_time
  order_by: social
  # 评论插件语言。
  lang: zh_TW

# Twikoo
# https://github.com/imaegoo/twikoo
twikoo:
  # Twikoo 环境 ID 或服务端地址。
  envId: 
