# --------------------------------------
# Hexo LiuShen 主题配置
# 如有疑问，请参考文档
# 中文：https://butterfly.js.org/
# 英文：https://butterfly.js.org/en/
# --------------------------------------

# --------------------------------------
# 导航设置
# --------------------------------------

nav:
  # 导航栏 logo 图片。留空时只显示站点名；可填写 /img/logo.png 或完整图片 URL。
  logo:
  # 站点名，留空时使用 Hexo 根配置的 title
  site_name:
  # 是否在导航栏显示站点名。
  display_title: true
  # 是否固定导航栏
  fixed: true
  # 导航右侧快捷入口。每一项支持：
  # id: 唯一标识；link: 跳转地址；title: 鼠标悬停提示；icon: Font Awesome 图标；
  # class: 导航项 class；raw_link: 为 true 时原样输出 link，适合 javascript:randomPost() 这类动作。
  # 默认留空，避免主题本体绑定某个站点的固定页面；需要时在站点根目录 _config.liushen.yml 中填写。
  right_items:
    # - id: random
    #   link: javascript:randomPost()
    #   title: 随机前往一篇文章
    #   icon: fa-solid fa-shuffle fa-fw
    #   class: site-page
    #   raw_link: true
  # 左上角指纹按钮展开的应用入口。留空或删除时按钮会自动隐藏。
  menu:

# 顶部导航菜单。格式：菜单名: 链接 || 图标；多级菜单使用缩进。
# 菜单分组格式：分组名 || 分组图标 || hide:，其中 hide 可隐藏分组标题。
menu:
  # 首页: / || fas fa-home
  # 列表||fas fa-list:
  #   音乐: /music/ || fas fa-music
  #   电影: /movies/ || fas fa-video

# 浏览器右键菜单设置。主题保留通用操作，站点页面入口通过 items 配置。
right_menu:
  # 是否启用主题自定义右键菜单。
  enable: true
  # 是否显示归档、分类、标签这三个通用入口。
  show_default_links: true
  # 自定义页面入口。留空时不显示任何站点私有链接。
  # id: 元素 id，可选；link: 页面地址；title: 显示文字；icon: Font Awesome 图标；raw_link: 为 true 时原样输出 link。
  items:
    # - id: message
    #   link: /comment/
    #   title: 留言板
    #   icon: fa-solid fa-comment

# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  # 代码块主题：darker / pale night / light / ocean / false
  theme: darker
  # 是否使用 macOS 风格的红黄绿窗口按钮。
  macStyle: true
  # 代码块高度限制（单位：像素）
  height_limit: 400
  # 是否自动换行；false 时横向滚动。
  word_wrap: true

  # 工具栏
  # 是否显示复制按钮。
  copy: true
  # 是否显示代码语言名称。
  language: true
  # true: 折叠代码块 | false: 展开代码块 | none: 展开代码块并隐藏按钮
  shrink: none
  # 是否启用代码块全屏查看按钮。
  fullpage: false

# 社交媒体链接
# 格式：
#   图标: 链接 || 描述 || 颜色
social:
  # fab fa-github: https://github.com/example || Github || '#24292e'
  # fas fa-envelope: mailto:contact@example.com || 邮箱 || '#4a7dbe'
#  fa-solid fa-envelope: mailto:contact@example.com || Email
#  fa-brands fa-github: https://github.com/example || Github
#  fa-solid fa-rss: /atom.xml || RSS
# --------------------------------------
# 图片设置
# --------------------------------------

# 浏览器标签页图标。建议放在 source/img/favicon.ico。
favicon: /img/favicon.ico

# 站点头像设置。
avatar:
  # 头像图片地址。
  img: /img/butterfly-icon.png

# 禁用所有页面顶部图片
disable_top_img: false

# 默认横幅图。文章、页面、标签页、分类页没有单独设置 top_img/cover 时使用。
# 留空表示不提供主题级默认横幅，页面会使用主题色背景。
default_top_img:

# 首页横幅图。只影响首页顶部大图；留空时使用 default_top_img。
index_img:

# 归档页横幅图。留空时使用 default_top_img。
archive_img:

# 注意：标签页（tag page），不是标签列表页（tags page）
# 所有标签详情页的默认横幅图。留空时使用 default_top_img。
tag_img:

# 标签页的横幅图片，你可以为每个标签设置横幅图片
# 格式：
#  - 标签名称: /img/tag-cover.jpg
tag_per_img:

# 注意：分类页（category page），不是分类列表页（categories page）
# 所有分类详情页的默认横幅图。留空时使用 default_top_img。
category_img:

# 分类页的横幅图片，你可以为每个分类设置横幅图片
# 格式：
#  - 分类名称: /img/category-cover.jpg
category_per_img:

# 页脚的背景图片
footer_img: false

# 网站固定背景图。只在需要全站背景图时填写图片 URL。
background:
# 深色模式网站固定背景图。留空时沿用 background 或主题默认背景。
background_dark:

# 文章封面显示规则。
cover:
  # 首页文章卡片是否显示封面。
  index_enable: true
  # 侧栏近期文章是否显示封面。
  aside_enable: true
  # 归档页文章列表是否显示封面。
  archives_enable: true
  # 当没有设置封面时，显示默认封面
  default_cover:
    # - /img/default-cover.jpg

# 替换损坏的图片
error_img:
  # 友链头像加载失败时使用的图片。
  flink: /img/loading.gif
  # 文章图片加载失败时使用的图片。
  post_page: /img/404.png

# 简单的 404 页面
error_404:
  # 是否启用主题内置 404 页面样式。
  enable: true
  # 404 页面副标题。
  subtitle: '页面未找到'
  # 404 页面背景图。
  background: /img/error-page.png

# 文章元信息显示设置。
post_meta:
  # 首页
  page:
    # 选择：created / updated / both
    date_type: both
    # 选择：date / relative
    date_format: date
    # 是否显示分类。
    categories: true
    # 是否显示标签。
    tags: true
    # 是否显示“发表于/更新于”等文字标签。
    label: true
  # 文章页元信息。
  post:
    # 选择：left / center
    position: left
    # 选择：created / updated / both
    date_type: both
    # 选择：date / relative
    date_format: date
    # 是否显示分类。
    categories: true
    # 是否显示标签。
    tags: true
    # 是否显示“发表于/更新于”等文字标签。
    label: true

# --------------------------------------
# 首页设置
# --------------------------------------

# 首页标题文本。留空时使用 Hexo 根配置 title。
info_title:
# 首页标题头像。留空时不显示标题头像；可填写主题内图片路径或完整 URL。
info_title_avatar:

# 首页的副标题
subtitle:
  # 是否显示首页副标题区域。
  enable: true
  # 是否启用 typed.js 打字机效果。
  # true: 多条副标题循环打字；false: 只显示第一条副标题文本。
  effect: true
  # typed.js 原生配置，会与主题默认打字速度/循环配置合并。
  # https://github.com/mattboldt/typed.js/#customization
  typed_option:
  # 副标题内容来源。
  # 选择：false/1/2/3
  # false: 不调用接口，只使用 sub 中的静态文本；sub 为空时回退到 Hexo 根配置 subtitle。
  # 1: 调用 api.renjian，将返回内容插入到 sub 第一条。
  # 2: 调用 api.hitokoto，将返回内容插入到 sub 第一条。
  # 3: 调用 api.poetry，将返回内容插入到 sub 第一条。
  source: 1
  # 第三方副标题 API 地址。
  # 如果 source 选择了 1/2/3，但对应 API 留空，则自动回退到 sub 静态文本。
  api:
    # source: 1 使用的接口，期望返回 JSON 且正文位于 data 字段。
    renjian: https://v1.nsuuu.com/api/renjian
    # source: 2 使用的接口，期望返回 JSON 且正文位于 data 字段。
    hitokoto: https://v1.nsuuu.com/api/yiyan?type=hitokoto
    # source: 3 使用的接口，期望返回 JSON 且正文位于 data 字段。
    poetry: https://v1.nsuuu.com/api/yiyan?type=poetry
  # 静态副标题列表。
  # source 为 false 时直接使用；source 为 1/2/3 时作为接口失败或接口留空时的回退内容。
  # 如果 effect 为 false，只显示第一条。
  sub:
#    - 既然选择远方，当不负青春，砥砺前行。
#    - 青春由磨砺而出彩，人生因奋斗而升华！
#    - 但行前路，不负韶华！
#    - 每一个裂缝都是为透出光而努力
#    - 美好的一天，上帝不会就这样给你，需要自己去创造。
#    - 你要做冲出的黑马 而不是坠落的星星。
#    - 纵然世间黑暗，仍有一点星光。
#    - 试一下，你会比你自己想象中的还要强大
#    - 眼里有不朽的光芒 心里有永恒的希望
#    - 等待的不仅仅是未来，还有希望…

# 首页的文章布局
# 1: 封面在左，信息在右
# 2: 封面在右，信息在左
# 3: 封面和信息左右交替
# 4: 封面在上，信息在下
# 5: 信息显示在封面上
# 6: 瀑布流布局 - 封面在上，信息在下
# 7: 瀑布流布局 - 信息显示在封面上
index_layout: 6

# 首页显示文章简介
# 1: description
# 2: both（如果存在描述，将显示描述，否则显示自动摘要）
# 3: auto_excerpt（默认）
# false: 不显示文章简介
index_post_content:
  # 摘要来源。1: description；2: description 优先，否则自动截取；3: 自动截取；false: 不显示。
  method: 2
  # 如果将方法设置为 2 或 3，需要配置长度
  length: 500

# 首页顶部轮播
index_swiper:
  # 是否显示首页文章轮播。
  enable: true
  # 是否允许鼠标滚轮切换轮播。
  mousewheel: true
  # 显示最近文章数量，0 表示全部
  limit: 5
  # 轮播切换动画时长，单位毫秒。
  speed: 550
  # 自动切换间隔，单位毫秒。
  delay: 3200

# --------------------------------------
# 文章设置
# --------------------------------------

toc:
  # 文章页是否显示目录。
  post: true
  # 普通页面是否显示目录。
  page: false
  # 是否显示目录编号。
  number: false
  # 是否默认展开所有目录层级。
  expand: false
  # 仅用于文章
  style_simple: false
  # 是否显示阅读进度百分比。
  scroll_percent: true

# 文章版权信息。显示在文章底部。
post_copyright:
  # 是否显示版权声明。
  enable: true
  # 是否解码 URL，避免中文路径显示为转义字符。
  decode: true
  # 作者链接。留空时使用 Hexo 根配置 url。
  author_href:
  # 默认协议名称。
  license: CC BY-NC-SA 4.0
  # 默认协议链接。
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 赞助/打赏
reward:
  # 是否显示打赏模块。
  enable: false
  # 打赏提示文案。
  text:
  # 收款码列表。img 是二维码图片，link 是点击后打开的大图，text 是按钮文字。
  QR_code:
    # - img: /img/wechat.png
    #   link: /img/wechat.png
    #   text: 微信
    # - img: /img/alipay.png
    #   link: /img/alipay.png
    #   text: 支付宝

# 文章编辑
# 在线轻松浏览和编辑博客源代码。
post_edit:
  # 是否显示“编辑本文”入口。
  enable: false
  # url: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  # 例如：https://github.com/jerryc127/butterfly.js.org/edit/main/source/
  url:

# 相关文章
related_post:
  # 是否显示相关文章。
  enable: true
  # 显示的文章数量
  limit: 3
  # 选择：created / updated
  date_type: created

# 选择：1 / 2 / false
# 1: “下一篇文章”将链接到旧文章
# 2: “下一篇文章”将链接到新文章
# false: 禁用分页
post_pagination: 2

# 显示文章过期提醒
noticeOutdate:
  # 是否显示文章过期提醒。
  enable: true
  # 样式：simple / flat
  style: flat
  # 何时显示提醒
  limit_day: 365
  # 位置：top / bottom
  position: top
  # 提醒文案前半段。
  message_prev: 本篇文章从发布到现在已经隔了
  # 提醒文案后半段。
  message_next: 天了，里面的内容可能过期了，你要自己甄别一下哟👉👈

# --------------------------------------
# 页脚设置
# --------------------------------------
footer:
  # 普通页脚所有者信息。
  owner:
    # 是否显示所有者版权。
    enable: true
    # 建站或版权起始年份。
    since: 2021
  # 普通页脚自定义文本，支持 HTML。
  custom_text:
  # 主题和框架的版权
  copyright: true

# 增强页脚。适合展示链接分组、备案、运行时间等信息。
footer_better:
  # 是否启用增强页脚。关闭后使用主题普通页脚。
  enable: true
  # Hexo 过滤器优先级。一般无需修改，数值越大越晚注入。
  priority: 5
  # 增强页脚生效页面。all 表示全站，也可填写具体页面路径。
  enable_page: all
  # 增强页脚挂载位置。默认挂载到 id="footer" 的容器。
  layout:
      # 挂载选择器类型：id / class / tag。
      type: id
      # 挂载容器名称，不需要写 # 或 .。
      name: footer
      # 匹配多个容器时使用第几个，从 1 开始。
      index: 1
