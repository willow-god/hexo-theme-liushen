  region:
  # 使用 Twikoo 访客计数作为页面浏览量
  visitor: false
  # Twikoo 额外配置。
  option:
    # Twikoo 代码高亮 CDN。留空时跟随主题全局 CDN 镜像。
    prismCdn:

# Giscus
# https://giscus.app/
giscus:
  # GitHub 仓库，格式：owner/repo。
  repo:
  # Giscus 生成的 repo_id。
  repo_id:
  # Giscus 生成的 category_id。
  category_id:
  # 浅色模式主题。
  light_theme: light
  # 深色模式主题。
  dark_theme: dark
  # 自定义 Giscus 脚本地址。留空时使用默认地址。
  js:
  # Giscus 额外配置。
  option:

# Remark42
# https://remark42.com/docs/configuration/frontend/
remark42:
  # Remark42 服务地址。
  host:
  # Remark42 站点 ID。
  siteId:
  # Remark42 额外配置。
  option:

# Artalk
# https://artalk.js.org/guide/frontend/config.html
artalk:
  # Artalk 服务端地址。
  server: 
  # Artalk 站点名。
  site: 
  # 使用 Artalk 访客计数作为页面浏览量
  visitor:
  # Artalk 额外配置。
  option:

# --------------------------------------
# 实时聊天服务
# --------------------------------------

chat:
  # 选择: chatra/tidio/daovoice/crisp
  # 如果不需要实时聊天，请留空
  use:
  # 聊天按钮 [推荐]
  # 它将在网站的右下角创建一个按钮，并隐藏原始按钮
  rightside_button: false
  # 当向上滚动时显示原始聊天按钮，向下滚动时隐藏按钮
  button_hide_show: false

# https://chatra.io/
chatra:
  # Chatra 后台提供的站点 ID。
  id:

# https://www.tidio.com/
tidio:
  # Tidio 后台提供的 public key。
  public_key:

# http://dashboard.daovoice.io/app
daovoice:
  # DaoVoice 后台提供的 app_id。
  app_id:

# https://crisp.chat/en/
crisp:
  # Crisp 后台提供的网站 ID。
  website_id:

# https://developers.facebook.com/docs/messenger-platform/discovery/facebook-chat-plugin/
messenger:
  # Facebook Page ID。
  pageID:
  # Messenger 插件语言。
  lang: zh_TW

# --------------------------------------
# 网站统计分析工具
# --------------------------------------

# https://tongji.baidu.com/web/welcome/login
# 百度统计 ID。留空表示不启用。
baidu_analytics:

# https://analytics.google.com/analytics/web/
# Google Analytics Measurement ID。留空表示不启用。
google_analytics:

# https://www.cloudflare.com/zh-tw/web-analytics/
# Cloudflare Web Analytics token。留空表示不启用。
cloudflare_analytics:

# https://clarity.microsoft.com/
# Microsoft Clarity 项目 ID。留空表示不启用。
microsoft_clarity:

# https://umami.is/
umami_analytics:
  # 是否启用 Umami。开源默认关闭。
  enable: false
  # Umami 服务地址。自部署时填写实例地址；Umami Cloud 可按官方要求填写。
  serverURL:
  # Umami 网站 ID。
  website_id:
  # Umami 额外前端配置。
  option:
  # 使用 Umami API 显示 UV/PV。需要 token，默认关闭。
  UV_PV:
    # 是否显示全站访客数。
    site_uv: false
    # 是否显示全站访问量。
    site_pv: false
    # 是否显示页面访问量。
    page_pv: false
    # Umami Cloud 填 API key，自部署 Umami 填 token。
    token:

# --------------------------------------
# 广告
# --------------------------------------

# 谷歌广告
google_adsense:
  # 是否启用 Google Adsense。
  enable: false
  # 是否启用自动广告。
  auto_ads: true
  # Adsense 脚本地址。一般无需修改。
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  # Adsense client ID，例如 ca-pub-your-id。
  client:
  # 是否启用页面级广告。
  enable_page_level_ads: true

# 手动插入广告
# 如果不需要广告，请留空
ad:
  # 在索引中插入广告（每三篇文章）
  index:
  # 在侧栏插入广告
  aside:
  # 在文章中插入广告（在分页之前）
  post:

# --------------------------------------
# 站点验证
# --------------------------------------

site_verification:
  # - name: baidu-site-verification
  #   content: your-verification-token

# --------------------------------------
# 美化 / 效果
# --------------------------------------

# 自定义主题颜色
# 注意: 颜色值必须使用双引号，如"#000" ，否则可能导致错误！

# theme_color:
#   enable: true
#   main: "#49B1F5"
#   paginator: "#00c4b6"
#   button_hover: "#FF7242"
#   text_selection: "#00c4b6"
#   link_color: "#99a9bf"
#   meta_color: "#858585"
#   hr_color: "#A4D8FA"
#   code_foreground: "#F47466"
#   code_background: "rgba(27, 31, 35, .05)"
#   toc_color: "#00c4b6"
#   blockquote_padding_color: "#49b1f5"
#   blockquote_background_color: "#49b1f5"
#   scrollbar_color: "#49b1f5"
#   meta_theme_color_light: "ffffff"
#   meta_theme_color_dark: "#0d0d0d"

# 分类和标签页面的用户界面设置
# 选择: index - 与首页界面相同 / default - 与存档界面相同
# 留空或选择index
category_ui: index
# 标签页 UI 风格。留空时通常沿用 category_ui。
# 可选：index / default
# index: 与首页卡片风格接近；default: 与归档页风格接近。
tag_ui:

# UI 元素的圆角设置
rounded_corners_ui: true

# 拉伸文本行使每行具有相同宽度
text_align_justify: false

# 为页眉和页脚添加半透明遮罩，提升背景图上的文字可读性。
mask:
  # 是否为顶部横幅区域添加遮罩。
  header: true
  # 是否为页脚区域添加遮罩。
  footer: false

# --------------------------------------
# 加载动画
# --------------------------------------
preloader:
  # 是否启用页面首次进入时的加载动画。开源默认关闭，避免干扰新用户。
  enable: false
  # 资源
  # 1. 全页加载动画
  # 2. pace（进度条）
  source: 1
  # 如果选择2，请选择一个 pace 主题 (见 https://codebyzach.github.io/pace/)
  pace_css_url:
  # 如果选择1，可以选择一种样式：default|gear|ironheart|scarecrow|triangles|wizard|image
  # 加载动画主色。
  load_color: '#FFFFFF'
  # 加载动画样式：default / gear / ironheart / scarecrow / triangles / wizard / image。
  load_style: default
  # load_style 为 image 时使用的加载图片地址。
  load_image:

# --------------------------------------
# 页面过渡效果
# --------------------------------------
# 是否启用页面进入/切换时的过渡动画。
enter_transitions: true

# 默认显示模式 - light（默认）/ dark
display_mode: light

# 文章内容美化设置
beautify:
  # 是否启用文章标题美化。
  enable: true
  # 指定要美化的字段（site 或 post）
  field: post
  # 指定用作标题前缀的图标，例如 '\f0c1'
  title_prefix_icon: '\f1bb'
  # 指定标题前缀图标的颜色，例如 '#F47466'
  title_prefix_icon_color:

# 全局字体设置
# 不要修改以下设置，除非你知道它们的作用
font:
  # 全站字号，例如 16px；留空时使用主题默认。
  global_font_size:
  # 代码块字号，例如 14px；留空时使用主题默认。
  code_font_size:
  # 全站字体栈。建议保留系统字体，减少额外外链依赖。
  font_family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Lato, Roboto, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif
  # 代码字体栈。留空时使用主题默认等宽字体。
  code_font_family:

# 站点标题和站点副标题的字体设置
blog_title_font:
  # Web Font CSS 地址。留空时不额外加载字体。
  font_link:
  # 标题字体名称，需要与 font_link 提供的字体一致。
  font_family:

# 分隔符图标设置
hr_icon:
  # 是否启用分隔线图标。
  enable: true
  # Font Awesome 图标的 unicode 值，例如 '\3423'
  icon:
  # 图标距离分隔线顶部的位置。
  icon-top:

# 打字动态效果增强
# https://github.com/disjukr/activate-power-mode
activate_power_mode:
  # 是否启用输入时的动效增强。
  enable: false
  # 是否使用彩色粒子。
  colorful: true
  # 是否启用页面震动效果。
  shake: true
  # 移动端是否启用。
  mobile: false

# --------------------------------------
# 背景效果增强
# --------------------------------------

# canvas_ribbon
# 见：https://github.com/hustcc/ribbon.js
canvas_ribbon:
  # 是否启用 canvas ribbon 背景效果。
  enable: false
  # 丝带的大小
  size: 150
  # 丝带的透明度 (0 ~ 1)
  alpha: 0.6
  # 背景层级。通常保持 -1，避免遮挡内容。
  zIndex: -1
  # 点击页面时是否切换丝带。
  click_to_change: false
  # 移动端是否启用。
  mobile: false

# Fluttering Ribbon
canvas_fluttering_ribbon:
  # 是否启用飘带背景效果。
  enable: false
  # 移动端是否启用。
  mobile: false

# canvas_nest
# https://github.com/hustcc/canvas-nest.js
canvas_nest:
  # 是否启用 canvas nest 线条背景效果。
  enable: false
  # 线条颜色，默认值：'0,0,0'；RGB 值: (R,G,B).(注意：使用 ',' 分隔)
  color: '0,0,255'
  # 线条的透明度 (0~1)
  opacity: 0.7
  # 背景的 z-index 属性
  zIndex: -1
  # 线条的数量
  count: 99
  # 移动端是否启用。
  mobile: false

# 鼠标点击效果：烟花
fireworks:
  # 是否启用点击烟花效果。
  enable: false
  # 动效层级。
  zIndex: 9999
  # 移动端是否启用。
  mobile: false

# 鼠标点击效果：心形符号
click_heart:
  # 是否启用点击爱心效果。
  enable: false
  # 移动端是否启用。
  mobile: false

# 鼠标点击效果：文字
clickShowText:
  # 是否启用点击文字效果。
  enable: false
  # 点击时显示的文字列表。
  text:
    # - I
    # - LOVE
    # - YOU
  # 文字大小。
  fontSize: 15px
  # 是否随机显示 text 中的文字。
  random: false
  # 移动端是否启用。
  mobile: false

# --------------------------------------
# 灯箱设置
# --------------------------------------

# 选择：fancybox / medium_zoom
# https://github.com/francoischalifour/medium-zoom
# https://fancyapps.com/fancybox/
# 如果不需要灯箱效果，请留空
lightbox: fancybox

# --------------------------------------
# 标签插件设置
# --------------------------------------

# 系列
series:
  # 是否启用文章系列标签插件。
  enable: true
  # 按标题或日期排序
  orderBy: 'title'
  # 排序方式. 1 为升序; -1 为降序
  order: 1
  # 是否显示系列文章序号。
  number: true

# ABCJS - ABC 音乐符号插件
# https://github.com/paulrosen/abcjs
abcjs:
  # 是否启用 ABCJS 音乐符号渲染。
  enable: false
  # true: 全站加载；false: 仅在 front-matter 标记 abcjs: true 的页面加载。
  per_page: true

# Mermaid - 图表
# https://github.com/mermaid-js/mermaid
mermaid:
  # 是否启用 Mermaid 图表。
  enable: false
  # 使用代码块编写 Mermaid 图表
  code_write: false
  # 内置主题：default / forest / dark / neutral
  theme:
    # 浅色模式 Mermaid 主题。
    light: default
    # 深色模式 Mermaid 主题。
    dark: dark

# Note - Bootstrap Callout
note:
  # Note 标签样式值：
  #  - simple    bs-callout 旧的警告样式。默认。
  #  - modern    bs-callout 新的（v2-v3）警告样式。
  #  - flat      带背景的扁平警告样式，类似于 Mozilla 或 StackOverflow。
  #  - disabled  禁用所有 Note 标签的 CSS 样式导入。
  style: flat
  # 是否显示 Note 标签图标。
  icons: true
  # Note 标签圆角大小，单位 px。
  border_radius: 3
  # 用于现代和扁平样式的背景颜色的亮度偏移百分比（modern: -12 | 12; flat: -18 | 6）。
  # 该选项也可以与禁用的 note 标签一起使用。
  light_bg_offset: 0

# Chat - 外挂标签聊天气泡。用于文章内自定义聊天样式，不等同于实时聊天服务。
chat_tag:
  # 自己的昵称。
  myNickName:
  # 自己的头像地址。
  myAvatar: 
  # 对方头像列表，可按标签插件用法配置。
  otherAvatars:

# 链接卡片/链接标签默认配置。
link_tag:
  # 链接卡片默认头像。
  default_avatar:
  # 指定域名对应头像，例如 github.com: /img/link/github.webp。
  domain_avatars:
    # github.com: /img/link/github.webp
  # 域名白名单。命中后可按内部链接样式处理。
  whitelist:
  # 站内链接提示文案。
  internal_tip: Internal link
  # 站外链接提示文案。
  external_tip: External link

# 说说页面数据源。默认关闭；开启后由 api/base_url 等配置提供数据。
shuoshuo:
  # 是否启用说说数据功能。
  enable: false
  # 说说 API 地址。
  api:
  # 说说详情或外链的基础地址。
  base_url:
  # 说说作者头像。
  avatar:
  # 浏览器缓存时长，单位分钟。
  cache_minutes: 30
  # 每页加载数量。
  page_size: 30
  # 外链内容默认封面。
  default_external_cover:
  # GitHub 外链内容默认封面。
  github_external_cover:
  # 音乐播放器 meting API 地址。
  meting_api:

# --------------------------------------
# 其他设置
# --------------------------------------

# https://github.com/MoOx/pjax
pjax:
  # 是否启用 PJAX 无刷新页面切换。
  enable: true
  # 从 pjax 中排除指定页面，例如 '/music/'
  exclude:
    # - /music/

# 注入 css 和脚本 (aplayer/meting)
aplayerInject:
  # 是否自动注入 APlayer/Meting 资源。
  enable: false
  # true: 全站注入；false: 仅在需要的页面注入。
  per_page: true

# Snackbar - Toast 通知
# https://github.com/polonel/SnackBar
# 位置：top-left / top-center / top-right / bottom-left / bottom-center / bottom-right
snackbar:
  # 是否启用 Toast 通知。
  enable: true
  # Toast 显示位置。
  position: top-right
  # 在明亮模式和黑暗模式下 Toast 通知的背景颜色
  bg_light: 'rgba(255, 255, 255, 0.509)'
  # 深色模式 Toast 背景色。
  bg_dark: 'rgba(48, 48, 48, 0.509)'

# InstantClick - 预加载
# https://instant.page/
# 是否启用 instant.page 链接预加载。
instantpage: true

# Pangu - 在中文字符和英文字符之间插入空格
# https://github.com/vinta/pangu.js
pangu:
  # 是否启用中英文自动空格。
  enable: false
  # 指定使用 pangu 的字段（site 或 post）
  field: site

# 延迟加载
# https://github.com/verlok/vanilla-lazyload
lazyload:
  # 是否启用图片懒加载。
  enable: true
  # 指定使用延迟加载的字段（site 或 post）
  field: site
  # 懒加载占位图。留空时使用透明占位。
  placeholder:
  # 是否启用模糊加载效果。
  blur: true

# PWA
# 查看 https://github.com/JLHwung/hexo-offline
# ---------------
pwa:
  # 是否启用 PWA。需要配合 hexo-offline 等插件。
  enable: false
  # manifest.json 地址。
  manifest:
  # Apple Touch Icon 地址。
  apple_touch_icon:
  # 32x32 favicon 地址。
  favicon_32_32:
  # 16x16 favicon 地址。
  favicon_16_16:
  # Safari pinned tab mask icon 地址。
  mask_icon:

# Open graph meta 标签
# https://hexo.io/docs/helpers#open-graph
Open_Graph_meta:
  # 是否输出 Open Graph / Twitter Card 元标签。
  enable: true
  # Open Graph 额外配置，字段会传给 Hexo open_graph helper。
  option:
    # twitter_card:
    # twitter_image:
    # twitter_id:
    # twitter_site:
    # google_plus:
    # fb_admins:
    # fb_app_id:

# 添加前缀以确保css兼容性
# 是否为生成的 CSS 自动添加浏览器前缀。
css_prefix: true

# 注入
# 将代码插入到 head（在 '</head>' 标签之前）和底部（在 '</body>' 标签之前）
inject:
  # 注入到 head 末尾的 HTML 片段列表。
  head:
    # - <link rel="stylesheet" href="/css/custom-font.css">
  # 注入到 body 底部的 HTML 片段列表。
  bottom:
    # - <script src="/js/custom.js"></script>

# CDN 设置
# 不要修改以下设置，除非你知道它们的作用
CDN:
  # 内部和第三方脚本的 CDN 提供商
  # 选项：local/jsdelivr/unpkg/cdnjs/custom
  # 注意：开发版本只能使用 'local' 作为内部脚本
  # 注意：当将第三方脚本设置为 'local' 时，需要安装 hexo-butterfly-extjs
  internal_provider: local
  # 第三方库资源来源。推荐 jsdelivr；国内站点可改 custom 并配置 custom_format。
  third_party_provider: jsdelivr

  # 添加版本号到 URL，true 或 false
  version: true

  # custom_provider 使用的自定义 URL 格式。
  # 可用变量包含：${name}、${version}、${file}、${min_file}、${cdnjs_name}、${min_cdnjs_file}。
  custom_format: https://jsd.example.com/npm/${name}@${version}/${min_file}


  # 单项 CDN 覆盖。
  option:
    # 单独覆盖某个资源的 CDN 地址。留空时使用 internal_provider / third_party_provider 生成。
    # 例如：fontawesome: https://cdn.example.com/fontawesome/css/all.min.css
    # abcjs_basic_js:
    # activate_power_mode:
    # algolia_js:
    # algolia_search:
    # aplayer_css:
    # aplayer_js:
    # artalk_css:
    # artalk_js:
    # blueimp_md5:
    # busuanzi: 
    # canvas_fluttering_ribbon:
    # canvas_nest:
    # canvas_ribbon:
    # click_heart:
    # clickShowText:
    # disqusjs:
    # disqusjs_css:
    # docsearch_css:
    # docsearch_js:
    # egjs_infinitegrid:
    # fancybox:
    # fancybox_css:
    # fireworks:
    # fontawesome:
    # gitalk:
    # gitalk_css:
    # giscus:
    # instantpage:
    # instantsearch:
    # katex:
    # katex_copytex:
    # lazyload:
    # local_search:
    # main:
    # main_css:
    # mathjax:
    # medium_zoom:
    # mermaid:
    # meting_js:
    # pangu:
    # prismjs_autoloader:
    # prismjs_js:
    # prismjs_lineNumber_js:
    # pjax:
    # sharejs:
    # sharejs_css:
    # snackbar:
    # snackbar_css:
    # translate:
    # twikoo:
    # typed:
    # utils:
    # valine:
    # waline_css:
    # waline_js:
