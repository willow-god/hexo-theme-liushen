name: Bug 报告
description: 提交问题以帮助改进 hexo-theme-liushen
title: "[Bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        提交前请先确认问题可以复现，并尽量提供最小复现信息。

  - type: input
    id: liushen-version
    attributes:
      label: LiuShen 版本
      description: 查看主题目录中的 package.json。
      placeholder: 例如 5.0.0
    validations:
      required: true

  - type: input
    id: hexo-version
    attributes:
      label: Hexo 与 Node.js 版本
      description: 在 Hexo 根目录执行 `hexo -v` 后粘贴关键版本信息。
      placeholder: Hexo 7.x / Node.js 20.x
    validations:
      required: true

  - type: dropdown
    id: modified-theme
    attributes:
      label: 是否修改过主题源码
      options:
        - 否，使用原始主题文件
        - 是，修改过主题文件
        - 不确定
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: 依赖插件
      description: 在 Hexo 根目录执行 `npm ls --depth 0`，粘贴相关输出。
      render: text
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请说明预期表现、实际表现、复现步骤和相关配置。
      placeholder: 请尽量附上截图、报错日志或可复现仓库。
    validations:
      required: true

  - type: input
    id: website
    attributes:
      label: 复现地址
      description: 如果线上可复现，请提供具体 URL；如仅本地复现，可填写“本地复现”。
      placeholder: https://example.com/problem-page/
    validations:
      required: false
