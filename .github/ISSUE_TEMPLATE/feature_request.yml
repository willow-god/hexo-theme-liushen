name: 功能建议
description: 为 hexo-theme-liushen 提出新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: 背景与问题
      description: 这个建议想解决什么使用场景或痛点？
      placeholder: 请描述当前使用中遇到的不便。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 请描述你希望主题如何支持该功能。
      placeholder: 可以给出配置示例、交互说明或参考链接。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果你尝试过其他实现方式，可以在这里说明。
    validations:
      required: false
